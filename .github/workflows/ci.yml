# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: ${{ matrix.task }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task:
          - test
          - fmt
          - clippy
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.3
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-${{ matrix.task }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.task }}-
            ${{ runner.os }}-cargo-

      - name: Run ${{ matrix.task }}
        run: |
          case "${{ matrix.task }}" in
            test)   nix develop --command cargo test --workspace --all-targets --locked ;;
            fmt)    nix develop --command cargo fmt --all -- --check ;;
            clippy) nix develop --command cargo clippy --workspace --all-targets --locked -- -D warnings ;;
          esac
        env:
          CARGO_TERM_COLOR: always
          RUST_BACKTRACE: 1

  nix:
    name: nix flake check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.3
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: nix flake check
        run: |
          nix flake check \
            --option extra-substituters "https://fenix.cachix.org" \
            --option extra-trusted-public-keys \
              "fenix.cachix.org-1:erQkK6aeUBwlDZbq9/GT2fslDvHYk/esNBX78CcM8Yo="
